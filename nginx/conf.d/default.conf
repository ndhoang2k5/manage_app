# nginx/conf.d/default.conf

# 1. Chuyển hướng HTTP -> HTTPS
server {
    listen 80;
    server_name ranbeevn.com www.ranbeevn.com;
    
    # Cho phép Certbot xác thực
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# 2. Cấu hình HTTPS
server {
    listen 443 ssl;
    server_name ranbeevn.com www.ranbeevn.com;

    # Đường dẫn chứng chỉ (Sẽ có sau khi chạy Certbot)
    ssl_certificate /etc/letsencrypt/live/ranbeevn.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ranbeevn.com/privkey.pem;

    # Cấu hình upload ảnh lớn
    client_max_body_size 20M;
    # Resolve động service name trong Docker để tránh giữ IP cũ khi container restart
    resolver 127.0.0.11 valid=30s ipv6=off;
    resolver_timeout 5s;

    # A. Cấu hình cho Frontend (React)
    location / {
        set $frontend_upstream fashion_frontend:80;
        proxy_pass http://$frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # --- BỔ SUNG CẤU HÌNH LỖI CHO REACT ROUTER ---
        proxy_intercept_errors on;
        error_page 404 = /index.html;
    }

    # B. Cấu hình cho Backend (API)
    location /api {
        set $backend_upstream backend:8000;
        proxy_pass http://$backend_upstream; # Tên service trong docker-compose
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    # C. Cấu hình xem ảnh (Static files)
    location /static {
        set $backend_static_upstream backend:8000;
        proxy_pass http://$backend_static_upstream;
    }
}